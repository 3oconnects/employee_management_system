services:
  # ─── BACKEND SERVICE (Node.js/Express) ────────────────
  - type: web
    name: ems-api
    env: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - fromGroup: ems-secrets

  # ─── FRONTEND SERVICE (Static Site) ───────────────────
  - type: web
    name: ems-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - fromGroup: ems-secrets
      - key: VITE_API_URL
        fromService:
          type: web
          name: ems-api
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ─── ENVIRONMENT GROUP ──────────────────────────────────
envVarGroups:
  - name: ems-secrets
