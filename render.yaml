services:
  # ─── BACKEND SERVICE (Node.js/Express) ────────────────
  - type: web
    name: ems-api
    env: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - group: ems-secrets  # <--- Uses your .env values from here

  # ─── FRONTEND SERVICE (Static Site) ───────────────────
  - type: web
    name: ems-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - group: ems-secrets  # <--- Shared secrets (like API URLs)
      - key: VITE_API_URL
        fromService:
          type: web
          name: ems-api
          property: host

# ─── ENVIRONMENT GROUP ──────────────────────────────────
envVarGroups:
  - name: ems-secrets
